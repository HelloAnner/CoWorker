version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directories:
      - /web
      - /apps/explore-lab/frontend
      - /apps/coworker-desktop/desktop
    schedule:
      interval: weekly
    groups:
      vite:
        patterns:
          - vite
          - vitest
          - "@vitejs/plugin-react"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
